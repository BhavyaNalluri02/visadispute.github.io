<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Dispute | Credera</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: #131313;
        line-height: 1.6;
        background: #f2f5f6;
      }
      header {
        background: #fff;
        padding: 20px 40px;
        border-bottom: 1px solid #eee;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      header nav a {
        margin-left: 24px;
        text-decoration: none;
        color: #131313;
        font-weight: 500;
      }
      .pega-section {
        background: #f2f5f6;
        padding: 48px 20px;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        gap: 0;
      }
      /* Vertical progress stepper */
      .progress-stepper {
        width: 220px;
        min-width: 220px;
        background: #fff;
        border-radius: 4px 0 0 4px;
        box-shadow: 0 1px 6px rgba(0,0,0,0.08);
        padding: 32px 20px;
        align-self: stretch;
        border-top: 4px solid #ff5327;
      }
      .progress-stepper h4 {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: #888;
        margin-bottom: 24px;
        font-weight: 600;
      }
      .stepper-list {
        list-style: none;
        padding: 0;
        margin: 0;
        position: relative;
      }
      .stepper-list li {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        position: relative;
        padding-bottom: 28px;
      }
      .stepper-list li:last-child { padding-bottom: 0; }
      .stepper-list li:not(:last-child)::after {
        content: '';
        position: absolute;
        left: 13px;
        top: 28px;
        width: 2px;
        bottom: 0;
        background: #ddd;
      }
      .stepper-list li.completed:not(:last-child)::after { background: #ff5327; }
      .step-circle {
        width: 28px;
        height: 28px;
        min-width: 28px;
        border-radius: 50%;
        border: 2px solid #ddd;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
        font-weight: 600;
        color: #aaa;
        background: #fff;
        position: relative;
        z-index: 1;
        transition: all 0.3s ease;
      }
      .stepper-list li.completed .step-circle {
        background: #ff5327;
        border-color: #ff5327;
        color: #fff;
      }
      .stepper-list li.active .step-circle {
        border-color: #ff5327;
        color: #ff5327;
        box-shadow: 0 0 0 3px rgba(255,83,39,0.15);
      }
      .step-label {
        font-size: 0.82rem;
        color: #999;
        padding-top: 4px;
        line-height: 1.3;
        transition: color 0.3s ease;
      }
      .stepper-list li.completed .step-label { color: #333; font-weight: 500; }
      .stepper-list li.active .step-label { color: #ff5327; font-weight: 600; }
      .pega-card {
        max-width: 820px;
        width: 100%;
        background: #fff;
        border-radius: 0 4px 4px 0;
        box-shadow: 0 1px 6px rgba(0,0,0,0.08);
        overflow: hidden;
      }
      .pega-card-top-bar { height: 4px; background: #ff5327; width: 100%; }
      .pega-card pega-embed { display: block; width: 100%; }
      /* Thank you screen */
      .thank-you-screen {
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 80px 40px;
        text-align: center;
        min-height: 400px;
        width: 100%;
        max-width: 1060px;
        background: #fff;
        border-radius: 4px;
        box-shadow: 0 1px 6px rgba(0,0,0,0.08);
        border-top: 4px solid #ff5327;
      }
      .thank-you-screen.visible { display: flex; }
      .thank-you-check {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: #ff5327;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 24px;
      }
      .thank-you-check svg {
        width: 40px; height: 40px; fill: none; stroke: #fff;
        stroke-width: 3; stroke-linecap: round; stroke-linejoin: round;
      }
      .thank-you-screen h2 { font-size: 2rem; color: #0a1628; margin-bottom: 16px; }
      .thank-you-screen .note-label {
        font-weight: 700; color: #ff5327; font-size: 0.9rem;
        text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;
      }
      .thank-you-screen p { font-size: 1.05rem; color: #555; max-width: 520px; line-height: 1.7; }
      /* Server down message */
      .server-down-screen {
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 80px 40px;
        text-align: center;
        min-height: 400px;
        width: 100%;
        max-width: 1060px;
        margin: 0 auto;
        background: #fff;
        border-radius: 4px;
        box-shadow: 0 1px 6px rgba(0,0,0,0.08);
        border-top: 4px solid #ff5327;
      }
      .server-down-screen.visible { display: flex; }
      .server-down-icon {
        width: 72px; height: 72px; border-radius: 50%;
        background: #f2f5f6; display: flex; align-items: center;
        justify-content: center; margin-bottom: 24px;
        font-size: 2rem; color: #ff5327;
      }
      .server-down-screen h2 { font-size: 1.6rem; color: #0a1628; margin-bottom: 12px; }
      .server-down-screen p { font-size: 1.05rem; color: #666; max-width: 420px; line-height: 1.7; }
    </style>
  </head>

        function injectStyleIntoDoc(doc) {
          if (!doc || doc.querySelector('#pega-hide-style')) return;
          try {
            const style = doc.createElement('style');
            style.id = 'pega-hide-style';
            style.textContent = css;
            doc.head.appendChild(style);
          } catch (e) {}
        }

        function tryInject() {
          const embed = document.getElementById('theEmbed');
          if (!embed) return;
          if (embed.shadowRoot) {
            const style = document.createElement('style');
            style.textContent = css;
            if (!embed.shadowRoot.querySelector('#pega-hide-style')) {
              style.id = 'pega-hide-style';
              embed.shadowRoot.appendChild(style);
            }
            embed.shadowRoot.querySelectorAll('iframe').forEach(function(iframe) {
              try { injectStyleIntoDoc(iframe.contentDocument); } catch (e) {}
            });
          }
          embed.querySelectorAll('iframe').forEach(function(iframe) {
            try { injectStyleIntoDoc(iframe.contentDocument); } catch (e) {}
            iframe.addEventListener('load', function() {
              try { injectStyleIntoDoc(iframe.contentDocument); } catch (e) {}
            });
          });
        }

        const interval = setInterval(tryInject, 1000);
        setTimeout(function() { clearInterval(interval); }, 30000);
        const observer = new MutationObserver(tryInject);
        observer.observe(document.body, { childList: true, subtree: true });

    <script>
      const stepKeywords = [
        { step: 1, patterns: ["collect supplemental", "supplemental information", "supplemental"] },
        { step: 2, patterns: ["customer interview"] },
        { step: 3, patterns: ["customer interview validation", "interview validation", "validation"] },
      ];

      let lastDetectedStep = 0;
      let flowCompleted = false;
      let pollIntervalId = null;

      function detectStepFromHeading(root) {
        let headingText = "";
        root.querySelectorAll("h1, h2, h3, h4").forEach(function(h) {
          if (h.offsetParent !== null && h.textContent.trim())
            headingText += " " + h.textContent.toLowerCase();
        });
        root.querySelectorAll("*").forEach(function(el) {
          if (el.shadowRoot) {
            el.shadowRoot.querySelectorAll("h1, h2, h3, h4").forEach(function(h) {
              if (h.textContent.trim()) headingText += " " + h.textContent.toLowerCase();
            });
          }
        });
        // Iterate in reverse so more specific later steps match before earlier ones
        for (let i = stepKeywords.length - 1; i >= 0; i--)
          for (let j = 0; j < stepKeywords[i].patterns.length; j++)
            if (headingText.indexOf(stepKeywords[i].patterns[j]) !== -1)
              return stepKeywords[i].step;
        return 0;
      }

      function updateStepper(currentStep) {
        if (currentStep === 0 || currentStep <= lastDetectedStep) return;
        var stepper = document.querySelector(".progress-stepper");
        if (stepper && stepper.style.display === "none") stepper.style.display = "";
        lastDetectedStep = currentStep;
        document.querySelectorAll("#progressStepper li").forEach(function(li) {
          var s = parseInt(li.getAttribute("data-step"), 10);
          li.classList.remove("active", "completed");
          if (s < currentStep) {
            li.classList.add("completed");
            li.querySelector(".step-circle").innerHTML = "&#10003;";
          } else if (s === currentStep) {
            li.classList.add("active");
            li.querySelector(".step-circle").textContent = s;
          } else {
            li.querySelector(".step-circle").textContent = s;
          }
        });
      }

      function showThankYou() {
        if (flowCompleted) return;
        flowCompleted = true;
        if (pollIntervalId) { clearInterval(pollIntervalId); pollIntervalId = null; }
        var pegaSection = document.querySelector(".pega-section");
        var thankYou = document.getElementById("thankYouSection");
        if (pegaSection) pegaSection.style.display = "none";
        if (thankYou) { thankYou.style.display = "flex"; thankYou.style.justifyContent = "center"; }
        var stepper = document.querySelector(".progress-stepper");
        if (stepper) stepper.remove();
      }

      function autoClickGo() {
        if (flowCompleted) return;
        var embed = document.getElementById("theEmbed");
        if (!embed || !embed.shadowRoot) return;
        var bodyText = embed.shadowRoot.textContent || "";
        if (!/open\s*tasks/i.test(bodyText)) return;

        if (lastDetectedStep >= 3) {
          showThankYou();
          return;
        }

        function clickGoInRoot(root) {
          var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null, false);
          var node;
          while (node = walker.nextNode()) {
            if (node.textContent.trim() === "Go") {
              var el = node.parentElement;
              while (el) {
                if (el.tagName === "BUTTON" || el.tagName === "A" || el.getAttribute("role") === "button" || el.getAttribute("role") === "link" || el.onclick || el.href) {
                  el.click();
                  return true;
                }
                el = el.parentElement;
              }
              if (node.parentElement) {
                node.parentElement.click();
                return true;
              }
            }
          }
          var allEls = root.querySelectorAll("*");
          for (var i = 0; i < allEls.length; i++) {
            if (allEls[i].shadowRoot) {
              if (clickGoInRoot(allEls[i].shadowRoot)) return true;
            }
          }
          return false;
        }
        clickGoInRoot(embed.shadowRoot);
      }

      function pollPegaStep() {
        if (flowCompleted) return;
        var embed = document.getElementById("theEmbed");
        if (!embed || !embed.shadowRoot) return;
        autoClickGo();
        var detected = detectStepFromHeading(embed.shadowRoot);
        updateStepper(detected);
        if (lastDetectedStep >= 3 && detected === 0) {
          showThankYou();
        }
      }

      pollIntervalId = setInterval(pollPegaStep, 1500);
      setInterval(function() {
        if (!flowCompleted) autoClickGo();
      }, 300);
      (function observeForStepChange() {
        var embed = document.getElementById("theEmbed");
        if (!embed) { setTimeout(observeForStepChange, 500); return; }
        if (!embed.shadowRoot) { setTimeout(observeForStepChange, 500); return; }
        new MutationObserver(pollPegaStep).observe(embed.shadowRoot, { childList: true, subtree: true });
      })();
    </script>

  </body>
</html>
